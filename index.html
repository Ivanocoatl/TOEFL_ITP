<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOEFL ITP Simulator PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: #f8fafc; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .option-card { transition: all 0.3s; cursor: pointer; border: 2px solid rgba(255, 255, 255, 0.05); }
        .option-card:hover { transform: translateY(-2px); background: rgba(255, 255, 255, 0.08); border-color: #3b82f6; }
        .selected-correct { background: #064e3b !important; border-color: #10b981 !important; }
        .selected-wrong { background: #450a0a !important; border-color: #ef4444 !important; }
        .audio-wave { display: flex; align-items: flex-end; gap: 3px; height: 20px; }
        .wave-bar { width: 3px; background: #60a5fa; border-radius: 50px; animation: wave 1s infinite; }
        @keyframes wave { 0%, 100% { height: 5px; } 50% { height: 20px; } }
        .hidden-section { display: none; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <div id="loading-screen" class="fixed inset-0 bg-slate-900 z-[100] flex flex-col items-center justify-center">
        <div class="w-16 h-16 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
        <p class="mt-4 font-bold tracking-widest text-blue-400 animate-pulse uppercase text-xs">Cargando Examen...</p>
    </div>

    <header class="p-6 flex justify-between items-center z-50">
        <div class="flex items-center gap-3">
            <div class="bg-blue-600 p-2.5 rounded-xl"><i class="fas fa-graduation-cap text-white text-xl"></i></div>
            <h1 class="text-xl font-extrabold tracking-tight">TOEFL <span class="text-blue-500">ITP</span> PRO</h1>
        </div>
        <div id="audio-indicator" class="hidden flex items-center gap-3 bg-slate-900/50 px-4 py-2 rounded-full border border-blue-500/30">
            <div class="audio-wave">
                <div class="wave-bar"></div><div class="wave-bar" style="animation-delay: 0.2s"></div><div class="wave-bar" style="animation-delay: 0.4s"></div>
            </div>
            <span class="text-[10px] font-bold text-blue-400 uppercase">Audio Activo</span>
        </div>
    </header>

    <main class="flex-1 flex flex-col items-center justify-center p-4">
        
        <section id="view-setup" class="w-full max-w-2xl animate__animated animate__fadeIn">
            <div class="glass p-10 rounded-[2.5rem] text-center">
                <h2 class="text-3xl font-extrabold mb-8">Configura tu sesión 🎧</h2>
                
                <div id="resume-alert" class="hidden mb-6 p-4 bg-blue-500/20 border border-blue-500/40 rounded-2xl flex justify-between items-center text-sm">
                    <span>Regresaste en la pregunta <span id="last-q-index">0</span></span>
                    <button onclick="resumeTest()" class="bg-blue-600 px-4 py-2 rounded-lg font-bold">CONTINUAR</button>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <button onclick="startTest('learning')" class="glass p-8 rounded-3xl hover:bg-white/5 text-left transition-all">
                        <i class="fas fa-brain text-emerald-500 text-2xl mb-4"></i>
                        <h3 class="font-bold text-xl">Modo Tutor</h3>
                        <p class="text-slate-400 text-sm mt-2">Retroalimentación con explicaciones en cada respuesta.</p>
                    </button>
                    <button onclick="startTest('real')" class="glass p-8 rounded-3xl hover:bg-white/5 text-left transition-all">
                        <i class="fas fa-stopwatch text-blue-500 text-2xl mb-4"></i>
                        <h3 class="font-bold text-xl">Modo Examen</h3>
                        <p class="text-slate-400 text-sm mt-2">Sin ayudas. Resultados al finalizar el test.</p>
                    </button>
                </div>
            </div>
        </section>

        <section id="view-test" class="hidden-section w-full max-w-4xl animate__animated animate__fadeInUp">
            <div class="glass p-8 md:p-12 rounded-[3rem] relative">
                <div class="flex justify-between items-start mb-8">
                    <span id="q-counter" class="text-5xl font-black text-slate-800">01</span>
                    <button onclick="saveAndExit()" class="text-xs font-bold text-slate-500 hover:text-red-400"><i class="fas fa-save mr-2"></i>GUARDAR Y SALIR</button>
                </div>
                
                <h3 id="question-text" class="text-2xl font-bold mb-8 text-slate-200 italic"></h3>
                <div id="options-container" class="grid grid-cols-1 gap-4"></div>

                <div id="explanation-panel" class="hidden mt-8 p-6 bg-slate-800/50 border-l-4 border-blue-500 rounded-xl">
                    <p class="text-[10px] font-black text-blue-400 uppercase mb-2">Explicación Técnica</p>
                    <p id="explanation-text" class="text-sm text-slate-300 italic"></p>
                </div>

                <div class="mt-10 flex justify-between items-center border-t border-white/5 pt-8">
                    <button id="btn-audio" onclick="playAudioRange()" class="w-14 h-14 bg-blue-600 rounded-full shadow-lg shadow-blue-600/40 hover:scale-110 transition-all flex items-center justify-center">
                        <i class="fas fa-play text-white"></i>
                    </button>
                    <button onclick="nextQuestion()" class="bg-white text-slate-900 px-10 py-4 rounded-2xl font-black hover:bg-blue-500 hover:text-white transition-all">SIGUIENTE</button>
                </div>
            </div>
        </section>
    </main>

    <audio id="audio-player"></audio>

    <script>
        let questions = [];
        let currentIndex = 0;
        let testMode = 'learning';
        const player = document.getElementById('audio-player');

        // 1. Carga de datos robusta para GitHub Pages
        window.onload = async () => {
            try {
                const res = await fetch('./examen_data.json');
                if (!res.ok) throw new Error("JSON no encontrado");
                questions = await res.json();
                document.getElementById('loading-screen').classList.add('hidden');
                checkSavedProgress();
            } catch (err) {
                console.error(err);
                alert("Error: Asegúrate de que 'examen_data.json' esté en la misma carpeta que index.html en GitHub.");
            }
        };

        function checkSavedProgress() {
            const saved = localStorage.getItem('toefl_v1_progress');
            if (saved) {
                const data = JSON.parse(saved);
                document.getElementById('resume-alert').classList.remove('hidden');
                document.getElementById('last-q-index').innerText = data.index + 1;
            }
        }

        function startTest(mode) {
            testMode = mode;
            showSection('view-test');
            renderQuestion();
        }

        function resumeTest() {
            const saved = JSON.parse(localStorage.getItem('toefl_v1_progress'));
            currentIndex = saved.index;
            testMode = saved.mode;
            showSection('view-test');
            renderQuestion();
        }

        function renderQuestion() {
            const q = questions[currentIndex];
            document.getElementById('q-counter').innerText = (currentIndex + 1).toString().padStart(2, '0');
            document.getElementById('question-text').innerText = q.pregunta || "Escucha el audio y selecciona la respuesta correcta:";
            document.getElementById('explanation-panel').classList.add('hidden');
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            q.opciones.forEach((opt, i) => {
                const div = document.createElement('div');
                div.className = 'option-card glass p-5 rounded-2xl flex items-center gap-4';
                div.innerHTML = `<div class="w-8 h-8 rounded-lg bg-white/10 flex items-center justify-center font-bold text-xs">${String.fromCharCode(65 + i)}</div><span>${opt}</span>`;
                div.onclick = () => selectOption(i, q.correcta, div);
                container.appendChild(div);
            });
        }

        function selectOption(idx, correct, el) {
            if (testMode === 'learning') {
                const cards = document.querySelectorAll('.option-card');
                cards.forEach(c => c.onclick = null);
                if (idx === correct) {
                    el.classList.add('selected-correct');
                } else {
                    el.classList.add('selected-wrong');
                    cards[correct].classList.add('selected-correct');
                }
                document.getElementById('explanation-text').innerText = questions[currentIndex].explicacion;
                document.getElementById('explanation-panel').classList.remove('hidden');
            } else {
                document.querySelectorAll('.option-card').forEach(c => c.style.borderColor = 'rgba(255,255,255,0.05)');
                el.style.borderColor = '#3b82f6';
            }
        }

        function playAudioRange() {
            const q = questions[currentIndex];
            if (!q.audio) return;
            player.src = q.audio;
            player.currentTime = q.inicio || 0;
            player.play();
            
            const indicator = document.getElementById('audio-indicator');
            indicator.classList.remove('hidden');
            
            const checkTime = () => {
                if (player.currentTime >= (q.fin || player.duration)) {
                    player.pause();
                    indicator.classList.add('hidden');
                    player.removeEventListener('timeupdate', checkTime);
                }
            };
            player.addEventListener('timeupdate', checkTime);
        }

        function nextQuestion() {
            currentIndex++;
            if (currentIndex < questions.length) {
                renderQuestion();
            } else {
                alert("¡Examen Terminado!");
                localStorage.removeItem('toefl_v1_progress');
                location.reload();
            }
        }

        function saveAndExit() {
            localStorage.setItem('toefl_v1_progress', JSON.stringify({ index: currentIndex, mode: testMode }));
            location.reload();
        }

        function showSection(id) {
            document.getElementById('view-setup').classList.add('hidden-section');
            document.getElementById('view-test').classList.add('hidden-section');
            document.getElementById(id).classList.remove('hidden-section');
        }
    </script>
</body>
</html>
