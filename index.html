<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOEFL ITP Simulator PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: #f8fafc; overflow: hidden; }
        
        .glass { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .option-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            border: 2px solid rgba(255, 255, 255, 0.05);
        }

        .option-card:hover { transform: translateY(-2px); background: rgba(255, 255, 255, 0.08); border-color: #3b82f6; }
        
        .selected-correct { background: #064e3b !important; border-color: #10b981 !important; color: #ecfdf5; }
        .selected-wrong { background: #450a0a !important; border-color: #ef4444 !important; color: #fef2f2; }

        /* Wave Animation */
        .audio-wave { display: flex; align-items: flex-end; gap: 3px; height: 20px; }
        .wave-bar { width: 3px; background: #60a5fa; border-radius: 50px; animation: wave 1s ease-in-out infinite; }
        @keyframes wave { 0%, 100% { height: 5px; } 50% { height: 20px; } }
        .pulse-btn { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(59, 130, 246, 0); } 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); } }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <div class="w-full h-1.5 bg-slate-800 fixed top-0 z-[100]">
        <div id="main-progress" class="h-full bg-blue-500 transition-all duration-500 shadow-[0_0_15px_rgba(59,130,246,0.5)]" style="width: 0%"></div>
    </div>

    <header class="p-6 flex justify-between items-center z-50">
        <div class="flex items-center gap-3">
            <div class="bg-blue-600 p-2.5 rounded-xl shadow-lg">
                <i class="fas fa-graduation-cap text-white text-xl"></i>
            </div>
            <h1 class="text-xl font-extrabold tracking-tight">TOEFL <span class="text-blue-500">ITP</span> MASTER</h1>
        </div>

        <div class="flex items-center gap-4">
            <div id="audio-indicator" class="hidden flex items-center gap-3 bg-slate-900/50 px-4 py-2 rounded-full border border-blue-500/30">
                <div class="audio-wave">
                    <div class="wave-bar" style="animation-delay: 0.1s"></div>
                    <div class="wave-bar" style="animation-delay: 0.2s"></div>
                    <div class="wave-bar" style="animation-delay: 0.3s"></div>
                </div>
                <span class="text-[10px] font-bold uppercase tracking-widest text-blue-400">Listening Active</span>
            </div>
            <button onclick="exitApp()" class="px-4 py-2 rounded-xl bg-red-500/10 text-red-500 hover:bg-red-500 hover:text-white transition-all font-bold text-sm">
                <i class="fas fa-sign-out-alt mr-2"></i>SALIR
            </button>
        </div>
    </header>

    <main class="flex-1 flex flex-col items-center justify-center p-4 overflow-y-auto">
        
        <section id="view-setup" class="w-full max-w-2xl animate__animated animate__fadeIn">
            <div class="glass p-10 rounded-[2.5rem] text-center">
                <span class="text-blue-400 font-bold tracking-[0.3em] uppercase text-xs">Simulador Profesional</span>
                <h2 class="text-4xl font-extrabold mt-4 mb-8">Elige tu modo de entrenamiento 🧠</h2>
                
                <div id="resume-alert" class="hidden mb-8 p-4 bg-blue-500/20 border border-blue-500/40 rounded-2xl flex items-center justify-between">
                    <span class="text-sm font-medium">👋 Tienes una sesión pendiente en la pregunta <span id="last-q-index">0</span></span>
                    <button onclick="resumeTest()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-xs font-bold transition-all">CONTINUAR</button>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <button onclick="startTest('learning')" class="glass p-8 rounded-3xl hover:bg-white/5 transition-all group text-left">
                        <div class="w-12 h-12 bg-emerald-500/20 text-emerald-500 rounded-xl flex items-center justify-center mb-4 text-xl group-hover:scale-110 transition-transform">
                            <i class="fas fa-lightbulb"></i>
                        </div>
                        <h3 class="text-xl font-bold mb-2">Modo Aprendizaje</h3>
                        <p class="text-slate-400 text-sm">Retroalimentación inmediata con explicaciones técnicas.</p>
                    </button>

                    <button onclick="startTest('real')" class="glass p-8 rounded-3xl hover:bg-white/5 transition-all group text-left">
                        <div class="w-12 h-12 bg-blue-500/20 text-blue-500 rounded-xl flex items-center justify-center mb-4 text-xl group-hover:scale-110 transition-transform">
                            <i class="fas fa-stopwatch"></i>
                        </div>
                        <h3 class="text-xl font-bold mb-2">Modo Real</h3>
                        <p class="text-slate-400 text-sm">Simulación oficial. Los resultados aparecen al final.</p>
                    </button>
                </div>
            </div>
        </section>

        <section id="view-test" class="hidden w-full max-w-4xl animate__animated animate__fadeInUp">
            <div class="glass p-8 md:p-12 rounded-[3rem] relative overflow-hidden">
                <div class="flex justify-between items-start mb-10">
                    <div>
                        <span id="question-category" class="bg-blue-500/20 text-blue-400 px-4 py-1 rounded-full text-[10px] font-black uppercase tracking-widest">Listening Section</span>
                        <h3 id="question-text" class="text-2xl font-bold mt-4 leading-relaxed italic text-slate-200">
                            "Select the best answer based on what you hear..."
                        </h3>
                    </div>
                    <div class="text-right">
                        <span id="q-counter" class="text-4xl font-black text-slate-700">01</span>
                    </div>
                </div>

                <div id="options-container" class="grid grid-cols-1 gap-4">
                    </div>

                <div id="explanation-panel" class="hidden mt-8 p-6 bg-slate-800/50 border-l-4 border-blue-500 rounded-xl animate__animated animate__fadeIn">
                    <p class="text-xs uppercase font-black text-blue-400 mb-2">Technical Insight 🎯</p>
                    <p id="explanation-text" class="text-sm leading-relaxed text-slate-300"></p>
                </div>

                <div class="mt-12 flex justify-between items-center border-t border-white/5 pt-8">
                    <button id="btn-audio" onclick="playQuestionAudio()" class="w-14 h-14 bg-blue-600 rounded-full flex items-center justify-center hover:scale-110 transition-all shadow-lg shadow-blue-600/40">
                        <i class="fas fa-headphones text-white"></i>
                    </button>
                    
                    <div class="flex gap-4">
                        <button onclick="nextQuestion()" class="bg-white text-slate-900 px-8 py-4 rounded-2xl font-black text-sm hover:bg-blue-500 hover:text-white transition-all flex items-center gap-3">
                            SIGUIENTE <i class="fas fa-chevron-right text-xs"></i>
                        </button>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <audio id="global-audio-player"></audio>

    <script>
        // --- CONFIGURACIÓN Y ESTADO ---
        let questions = [];
        let currentIndex = 0;
        let config = { mode: 'learning' }; // 'learning' o 'real'
        const audioPlayer = document.getElementById('global-audio-player');
        
        // --- INICIALIZACIÓN ---
        window.onload = () => {
            loadQuestions();
            checkPersistence();
        };

        async function loadQuestions() {
            try {
                const response = await fetch('examen_data.json');
                questions = await response.json();
            } catch (e) {
                console.error("Error cargando JSON:", e);
                // Fallback de prueba
                questions = [{
                    id: 1, pregunta: "Listen and choose the correct answer:", 
                    opciones: ["She is going to the park", "She will stay at home", "She is tired", "She doesn't know"],
                    correcta: 0, explicacion: "The speaker uses the future continuous to indicate a planned action.",
                    audio: "test.mp3", inicio: 5, fin: 10
                }];
            }
        }

        function checkPersistence() {
            const saved = localStorage.getItem('toefl_progress');
            if (saved) {
                const data = JSON.parse(saved);
                document.getElementById('resume-alert').classList.remove('hidden');
                document.getElementById('last-q-index').innerText = data.index + 1;
            }
        }

        // --- LÓGICA DE NAVEGACIÓN ---
        function startTest(mode) {
            config.mode = mode;
            currentIndex = 0;
            showView('view-test');
            renderQuestion();
        }

        function resumeTest() {
            const saved = JSON.parse(localStorage.getItem('toefl_progress'));
            config.mode = saved.mode;
            currentIndex = saved.index;
            showView('view-test');
            renderQuestion();
        }

        function renderQuestion() {
            const q = questions[currentIndex];
            if (!q) return finishTest();

            // Guardar progreso
            localStorage.setItem('toefl_progress', JSON.stringify({ index: currentIndex, mode: config.mode }));

            // UI
            document.getElementById('q-counter').innerText = (currentIndex + 1).toString().padStart(2, '0');
            document.getElementById('question-text').innerText = q.pregunta;
            document.getElementById('explanation-panel').classList.add('hidden');
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            q.opciones.forEach((opt, i) => {
                const btn = document.createElement('div');
                btn.className = 'option-card glass p-5 rounded-2xl flex items-center gap-4';
                btn.innerHTML = `
                    <div class="w-8 h-8 rounded-lg bg-white/10 flex items-center justify-center font-bold text-sm">${String.fromCharCode(65 + i)}</div>
                    <span class="font-medium">${opt}</span>
                `;
                btn.onclick = () => selectOption(i, q.correcta, btn);
                container.appendChild(btn);
            });

            // Actualizar barra
            document.getElementById('main-progress').style.width = `${((currentIndex) / questions.length) * 100}%`;
        }

        function selectOption(index, correct, element) {
            if (config.mode === 'learning') {
                const cards = document.querySelectorAll('.option-card');
                cards.forEach(c => c.onclick = null); // Bloquear clics

                if (index === correct) {
                    element.classList.add('selected-correct');
                } else {
                    element.classList.add('selected-wrong');
                    cards[correct].classList.add('selected-correct');
                }
                
                document.getElementById('explanation-text').innerText = questions[currentIndex].explicacion;
                document.getElementById('explanation-panel').classList.remove('hidden');
            } else {
                // Modo Real: Solo marcar selección visual
                document.querySelectorAll('.option-card').forEach(c => c.classList.remove('bg-blue-600/30', 'border-blue-500'));
                element.classList.add('bg-blue-600/30', 'border-blue-500');
            }
        }

        function nextQuestion() {
            currentIndex++;
            if (currentIndex < questions.length) {
                renderQuestion();
            } else {
                finishTest();
            }
        }

        // --- CONTROL DE AUDIO PRECISO ---
        function playQuestionAudio() {
            const q = questions[currentIndex];
            if (!q.audio) return;

            audioPlayer.src = q.audio;
            audioPlayer.currentTime = q.inicio;
            
            const btn = document.getElementById('btn-audio');
            const indicator = document.getElementById('audio-indicator');
            
            audioPlayer.play();
            btn.classList.add('pulse-btn', 'bg-blue-400');
            indicator.classList.remove('hidden');

            const checkTime = () => {
                if (audioPlayer.currentTime >= q.fin) {
                    audioPlayer.pause();
                    btn.classList.remove('pulse-btn', 'bg-blue-400');
                    indicator.classList.add('hidden');
                    audioPlayer.removeEventListener('timeupdate', checkTime);
                }
            };

            audioPlayer.addEventListener('timeupdate', checkTime);
        }

        // --- UTILIDADES ---
        function showView(id) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function exitApp() {
            if (confirm("¿Seguro que quieres salir? Tu progreso se guardará automáticamente.")) {
                location.reload();
            }
        }

        function finishTest() {
            localStorage.removeItem('toefl_progress');
            alert("🎯 ¡Felicidades! Has terminado el simulador.");
            location.reload();
        }
    </script>
</body>
</html>
